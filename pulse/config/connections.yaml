# ===========================================================================
# PULSE — MVP Connection Configuration
# This file defines which source systems PULSE connects to and how teams
# map to projects/repos in those systems.
#
# In MVP, this YAML is the single source of truth for integrations.
# It is loaded by ConfigLoaderService at startup.
# ===========================================================================

organization:
  name: "Webmotors"
  slug: "webmotors"
  plan: "team"

# Source system connections
connections:
  - name: "Webmotors GitHub"
    source: github
    # Token resolved from environment variable GITHUB_TOKEN
    token_env: GITHUB_TOKEN
    base_url: https://api.github.com
    sync_interval_minutes: 15
    # Per ingestion-spec §2.3 (Discovery-Only): NO explicit list of repos.
    # The connector calls `discover_repos(active_months=12)` on each cycle
    # via GraphQL `organization.repositories(orderBy: PUSHED_AT)` filtered
    # by activity. New repos appear automatically; archived ones drop off
    # without manual YAML edits.
    scope:
      active_months: 12

  - name: "Webmotors Jenkins"
    source: jenkins
    # Credentials resolved from environment variables
    username_env: JENKINS_USERNAME
    token_env: JENKINS_API_TOKEN
    base_url: ${JENKINS_BASE_URL}
    sync_interval_minutes: 15
    scope:
      # Job list is loaded from config/jenkins-job-mapping.json (auto-generated).
      # Generated by READ-ONLY SCM scan of active PRD Jenkins jobs — each
      # job's lastBuild → remoteUrls resolves the GitHub repo. Per
      # ingestion-spec §3.6, regen via scripts/discover_jenkins_jobs.py
      # when new repos appear (manual or weekly cron).
      jobs_from_mapping: true

  - name: "Webmotors Jira"
    source: jira
    # Jira Cloud uses Basic Auth: email (username) + API token (password)
    username_env: JIRA_EMAIL
    token_env: JIRA_API_TOKEN
    base_url: https://webmotors.atlassian.net
    sync_interval_minutes: 15
    # Per ingestion-spec §2.3 (Discovery-Only): NO explicit project list.
    # `ProjectDiscoveryService` lists ALL Jira projects; `SmartPrioritizer`
    # auto-activates projects with ≥3 PR references. Tenant config in
    # `tenant_jira_config` controls discovery mode (must be 'smart' for
    # auto-activation). PII-flagged projects require manual approval.
    scope:
      mode: smart
      smart_min_pr_references: 3
      smart_pr_scan_days: 90

# Issue status mapping — Webmotors Jira (Portuguese) → PULSE normalized
# Primary source; overrides DEFAULT_STATUS_MAPPING in normalizer.py.
# Normalized values: todo | in_progress | in_review | done
# ADR: "testing" states map to "in_review" (both are post-dev WIP for CFD)
# ADR: "Aguardando Deploy Produção" = done (dev work complete; deploy tracked by Jenkins/DORA)
status_mapping:
  # ── Backlog / To Do ──
  "refinado": "todo"
  "backlog": "todo"
  "quebra de histórias": "todo"
  "to do": "todo"
  "open": "todo"
  "new": "todo"
  # ── In Progress ──
  "em design": "in_progress"
  "em imersão": "in_progress"
  "em desenvolvimento": "in_progress"
  "in progress": "in_progress"
  "em andamento": "in_progress"
  # ── Review / Testing (collapsed to in_review for CFD 5-band model) ──
  "aguardando code review": "in_review"
  "em code review": "in_review"
  "product review": "in_review"
  "planejando testes": "in_review"
  "em teste azul": "in_review"
  "aguardando teste azul": "in_review"
  "em teste hml": "in_review"
  "testando": "in_review"
  "qa": "in_review"
  # ── Backlog / Waiting (Kanban upstream stages) ──
  "priorizado": "todo"
  "aguardando histórias": "todo"
  "aguardando desenvolvimento": "todo"
  "priorizado gp": "todo"
  "pronto para o gp": "todo"
  # ── In Progress (active work, pre-dev analysis) ──
  "construção de hipótese": "in_progress"
  "desenvolvimento": "in_progress"
  "design": "in_progress"
  "analise": "in_progress"
  "discovery": "in_progress"
  "entendimento": "in_progress"
  # ── Done ──
  "pós-implantação": "done"
  "aguardando deploy produção": "done"
  "concluído": "done"
  "cancelado": "done"
  "fechado": "done"
  "done": "done"
  "closed": "done"
  "resolved": "done"

# Team definitions and their mappings to source system projects
teams:
  - name: "Canais Digitais Web"
    slug: "canais-digitais-web"
    mappings:
      github:
        repositories:
          - "webmotors-private/webmotors.next.ui"
          - "webmotors-private/webmotors.portal.ui"
          - "webmotors-private/webmotors.buyer.ui"
          - "webmotors-private/webmotors.buyer.desktop.ui"
          - "webmotors-private/webmotors.catalogo.next.ui"
          - "webmotors-private/webmotors.fipe.next.ui"
      jira:
        projects:
          - "DESC"
          - "ENO"
          - "ANCR"
          - "PUSO"

  - name: "Canais Digitais App"
    slug: "canais-digitais-app"
    mappings:
      github:
        repositories:
          - "webmotors-private/webmotors.pf"
          - "webmotors-private/eleanor.flutter"
          - "webmotors-private/webmotors.app.pf.search.bff"
      jira:
        projects:
          - "APPF"

  - name: "Fidelidade"
    slug: "fidelidade"
    mappings:
      jira:
        projects:
          - "FID"

  - name: "Turbo Lab"
    slug: "turbo-lab"
    mappings:
      jira:
        projects:
          - "CTURBO"
          - "PTURB"
