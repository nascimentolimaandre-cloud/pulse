# ===========================================================================
# PULSE — MVP Connection Configuration
# This file defines which source systems PULSE connects to and how teams
# map to projects/repos in those systems.
#
# In MVP, this YAML is the single source of truth for integrations.
# It is loaded by ConfigLoaderService at startup.
# ===========================================================================

organization:
  name: "Webmotors"
  slug: "webmotors"
  plan: "team"

# Source system connections
connections:
  - name: "Webmotors GitHub"
    source: github
    # Token resolved from environment variable GITHUB_TOKEN
    token_env: GITHUB_TOKEN
    base_url: https://api.github.com
    sync_interval_minutes: 15
    scope:
      repositories:
        - "webmotors-private/webmotors.next.ui"
        - "webmotors-private/webmotors.portal.ui"
        - "webmotors-private/webmotors.buyer.ui"
        - "webmotors-private/webmotors.buyer.desktop.ui"
        - "webmotors-private/webmotors.catalogo.next.ui"
        - "webmotors-private/webmotors.fipe.next.ui"
        - "webmotors-private/webmotors.pf"
        - "webmotors-private/eleanor.flutter"
        - "webmotors-private/webmotors.app.pf.search.bff"

  - name: "Webmotors Jenkins"
    source: jenkins
    # Credentials resolved from environment variables
    username_env: JENKINS_USERNAME
    token_env: JENKINS_API_TOKEN
    base_url: ${JENKINS_BASE_URL}
    sync_interval_minutes: 15
    scope:
      # Auto-mapped 2026-03-27 by scanning 1404 Jenkins jobs (READ-ONLY).
      # Each job's lastBuild → BuildData → remoteUrls was matched to our 9 GitHub repos.
      # Only PRD (production) jobs are included — for DORA Deployment Frequency.
      # Full mapping saved in config/jenkins-job-mapping.json.
      #
      # Since these ARE production jobs (job name contains "prd"), every build
      # counts as a production deployment. deploymentPattern matches all builds;
      # productionPattern matches the job name itself (always "prd").
      jobs:
        # ── webmotors.next.ui (3 PRD jobs) ─────────────────
        - fullName: "prd-wm-buyer-home-frontend-ui"
          deploymentPattern: ".*"
          productionPattern: "(?i)prd"
        - fullName: "prd-wm-buyer-search-frontend-ui"
          deploymentPattern: ".*"
          productionPattern: "(?i)prd"
        - fullName: "prd-wm-buyer-subscriptions-frontend-ui"
          deploymentPattern: ".*"
          productionPattern: "(?i)prd"
        # ── webmotors.portal.ui (1 PRD job) ────────────────
        - fullName: "prd-wm-buyer-lambda-home-ui"
          deploymentPattern: ".*"
          productionPattern: "(?i)prd"
        # ── webmotors.buyer.ui (1 PRD job) ─────────────────
        - fullName: "prd-wm-buyer-lambda-mobile-ui"
          deploymentPattern: ".*"
          productionPattern: "(?i)prd"
        # ── webmotors.buyer.desktop.ui (1 PRD job) ─────────
        - fullName: "prd-wm-buyer-lambda-desktop-ui"
          deploymentPattern: ".*"
          productionPattern: "(?i)prd"
        # ── webmotors.catalogo.next.ui (1 PRD job) ─────────
        - fullName: "catalogo-next-ui-prd"
          deploymentPattern: ".*"
          productionPattern: "(?i)prd"
        # ── webmotors.fipe.next.ui (1 PRD job) ─────────────
        - fullName: "fipe-next-ui-prd"
          deploymentPattern: ".*"
          productionPattern: "(?i)prd"
        # ── webmotors.pf (6 PRD jobs: android, iOS, web) ───
        - fullName: "android-pf-prd-firebase"
          deploymentPattern: ".*"
          productionPattern: "(?i)prd"
        - fullName: "android-pf-prd-playstore"
          deploymentPattern: ".*"
          productionPattern: "(?i)prd"
        - fullName: "ios-pf-prd-firebase"
          deploymentPattern: ".*"
          productionPattern: "(?i)prd"
        - fullName: "ios-pf-prd-testflight"
          deploymentPattern: ".*"
          productionPattern: "(?i)prd"
        - fullName: "web-cms-pf-prd"
          deploymentPattern: ".*"
          productionPattern: "(?i)prd"
        - fullName: "webservicos-web-prd"
          deploymentPattern: ".*"
          productionPattern: "(?i)prd"
        # ── eleanor.flutter (1 job — no env suffix) ────────
        - fullName: "webmotors-eleanor-flutter"
          deploymentPattern: ".*"
          productionPattern: ".*"
        # ── webmotors.app.pf.search.bff (1 job — no env suffix)
        - fullName: "webmotors-app-api-search-bff"
          deploymentPattern: ".*"
          productionPattern: ".*"

  - name: "Webmotors Jira"
    source: jira
    # Jira Cloud uses Basic Auth: email (username) + API token (password)
    username_env: JIRA_EMAIL
    token_env: JIRA_API_TOKEN
    base_url: https://webmotors.atlassian.net
    sync_interval_minutes: 15
    scope:
      projects:
        # Canais Digitais Web (Kanban)
        - "DESC"    # PF - Descobrir veículo
        - "ENO"     # PF - Encontrar oferta
        - "ANCR"    # PF - Anunciar
        - "PUSO"    # PF - USO
        # Canais Digitais App (Kanban)
        - "APPF"    # PF - Aplicativo
        # Sprint-based projects
        - "FID"     # Fidelidade
        - "CTURBO"  # Consultor Turbo Lab
        - "PTURB"   # Portal Turbo Lab

# Issue status mapping — Webmotors Jira (Portuguese) → PULSE normalized
# Primary source; overrides DEFAULT_STATUS_MAPPING in normalizer.py.
# Normalized values: todo | in_progress | in_review | done
# ADR: "testing" states map to "in_review" (both are post-dev WIP for CFD)
# ADR: "Aguardando Deploy Produção" = done (dev work complete; deploy tracked by Jenkins/DORA)
status_mapping:
  # ── Backlog / To Do ──
  "refinado": "todo"
  "backlog": "todo"
  "quebra de histórias": "todo"
  "to do": "todo"
  "open": "todo"
  "new": "todo"
  # ── In Progress ──
  "em design": "in_progress"
  "em imersão": "in_progress"
  "em desenvolvimento": "in_progress"
  "in progress": "in_progress"
  "em andamento": "in_progress"
  # ── Review / Testing (collapsed to in_review for CFD 5-band model) ──
  "aguardando code review": "in_review"
  "em code review": "in_review"
  "product review": "in_review"
  "planejando testes": "in_review"
  "em teste azul": "in_review"
  "aguardando teste azul": "in_review"
  "em teste hml": "in_review"
  "testando": "in_review"
  "qa": "in_review"
  # ── Backlog / Waiting (Kanban upstream stages) ──
  "priorizado": "todo"
  "aguardando histórias": "todo"
  "aguardando desenvolvimento": "todo"
  "priorizado gp": "todo"
  "pronto para o gp": "todo"
  # ── In Progress (active work, pre-dev analysis) ──
  "construção de hipótese": "in_progress"
  "desenvolvimento": "in_progress"
  "design": "in_progress"
  "analise": "in_progress"
  "discovery": "in_progress"
  "entendimento": "in_progress"
  # ── Done ──
  "pós-implantação": "done"
  "aguardando deploy produção": "done"
  "concluído": "done"
  "cancelado": "done"
  "fechado": "done"
  "done": "done"
  "closed": "done"
  "resolved": "done"

# Team definitions and their mappings to source system projects
teams:
  - name: "Canais Digitais Web"
    slug: "canais-digitais-web"
    mappings:
      github:
        repositories:
          - "webmotors-private/webmotors.next.ui"
          - "webmotors-private/webmotors.portal.ui"
          - "webmotors-private/webmotors.buyer.ui"
          - "webmotors-private/webmotors.buyer.desktop.ui"
          - "webmotors-private/webmotors.catalogo.next.ui"
          - "webmotors-private/webmotors.fipe.next.ui"
      jira:
        projects:
          - "DESC"
          - "ENO"
          - "ANCR"
          - "PUSO"

  - name: "Canais Digitais App"
    slug: "canais-digitais-app"
    mappings:
      github:
        repositories:
          - "webmotors-private/webmotors.pf"
          - "webmotors-private/eleanor.flutter"
          - "webmotors-private/webmotors.app.pf.search.bff"
      jira:
        projects:
          - "APPF"

  - name: "Fidelidade"
    slug: "fidelidade"
    mappings:
      jira:
        projects:
          - "FID"

  - name: "Turbo Lab"
    slug: "turbo-lab"
    mappings:
      jira:
        projects:
          - "CTURBO"
          - "PTURB"
