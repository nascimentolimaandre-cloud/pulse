# ===========================================================================
# PULSE — MVP Connection Configuration
# This file defines which source systems PULSE connects to and how teams
# map to projects/repos in those systems.
#
# In MVP, this YAML is the single source of truth for integrations.
# It is loaded by ConfigLoaderService at startup.
# ===========================================================================

organization:
  name: "Acme Corp"
  slug: "acme-corp"
  plan: "team"

# Source system connections
connections:
  - name: "Acme GitHub"
    source: github
    # Token resolved from environment variable GITHUB_TOKEN
    token_env: GITHUB_TOKEN
    base_url: https://api.github.com
    sync_interval_minutes: 15
    scope:
      repositories:
        - "acme-corp/backend-api"
        - "acme-corp/frontend-app"
        - "acme-corp/shared-libs"

  - name: "Acme Jira"
    source: jira
    # Token resolved from JIRA_API_TOKEN env var
    token_env: JIRA_API_TOKEN
    email_env: JIRA_EMAIL
    base_url: https://acme-corp.atlassian.net
    sync_interval_minutes: 15
    scope:
      projects:
        - "BACK"
        - "FRONT"

# Team definitions and their mappings to source system projects
teams:
  - name: "Platform Team"
    slug: "platform-team"
    mappings:
      github:
        repositories:
          - "acme-corp/backend-api"
          - "acme-corp/shared-libs"
      jira:
        projects:
          - "BACK"

  - name: "Product Team"
    slug: "product-team"
    mappings:
      github:
        repositories:
          - "acme-corp/frontend-app"
      jira:
        projects:
          - "FRONT"
